<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Little Mono</title>
    <meta name="description" content="Set a new password for your Little Mono account.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page-container">
        <div class="auth-card">
            <div class="auth-card-header" onclick="window.location.href='index.html'">
                <div class="logo">
                    <span class="brand-name">LITTLE MONO</span>
                    <span class="sub-brand">DESIGNER TOYS</span>
                </div>
            </div>
            
            <form class="auth-form active" id="resetForm">
                <h2 class="auth-title">Reset Password</h2>
                <p class="auth-subtitle">Create a strong new password for your account</p>
                
                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password" required autocomplete="new-password">
                </div>
                <div class="input-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="btn-auth-submit" id="submitBtn">Update Password</button>
            </form>

            <div class="auth-back-link">
                <a href="login.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" style="transform: rotate(180deg); display: inline-block; vertical-align: middle;">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <span style="vertical-align: middle;">Back to Sign In</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api/v1';
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const token = params.get('token');
        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');

        if (!email || !token) {
            alert('Invalid or missing password reset parameters. Redirecting to recovery page.');
            window.location.href = 'forgot-password.html';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            if (password !== confirm) {
                alert("Passwords do not match!");
                return;
            }

            submitBtn.innerText = "Resetting Password...";
            submitBtn.disabled = true;

            try {
                const data = await $.ajax({
                    url: `${API_URL}/reset-password`,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email, token, password }),
                    dataType: 'json'
                });

                alert(data.message || "Your password has been successfully reset! Redirecting to login.");
                window.location.href = 'login.html';
            } catch (xhr) {
                const errData = xhr.responseJSON || {};
                alert(errData.error || "Failed to reset password. The link may have expired.");
            } finally {
                submitBtn.innerText = "Update Password";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
