<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Little Mono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="window.location.href='index.html'">
            <span class="brand-name">LITTLE MONO</span>
            <span class="sub-brand">DESIGNER TOYS</span>
        </div>
        <nav class="nav-links">
            <a href="home.html" class="nav-link">Home</a>
            <a href="cart.html" class="nav-link">Cart</a>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="profile.html" class="nav-link active">Profile</a>
        </nav>
        <div class="header-actions">
            <a href="login.html" class="btn-login" id="loginRegisterBtn">Login / Register</a>
        </div>
    </header>

    <div class="auth-page-container" style="padding-top: 120px; height: auto;">
        <div class="auth-card" style="max-width: 600px; width: 95%;">
            <h2 class="auth-title">My Profile</h2>
            <p class="auth-subtitle">Update your personal collector information and profile photo</p>
            
            <form class="auth-form active" id="profileForm" enctype="multipart/form-data">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="First Name">
                    </div>
                    <div class="input-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Last Name">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="addressline">Address Line</label>
                    <input type="text" id="addressline" placeholder="Street Address">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="zipcode">Zip Code</label>
                        <input type="text" id="zipcode" placeholder="Zip Code">
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" placeholder="Phone Number">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="avatar">Profile Avatar</label>
                    <input type="file" id="avatar" name="image" accept="image/*" style="background-color: transparent; border: none; padding: 0.5rem 0;">
                </div>
                
                <button type="submit" class="btn-auth-submit">Save Profile</button>
            </form>

            <div class="auth-back-link">
                <a href="dashboard.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" style="transform: rotate(180deg); display: inline-block; vertical-align: middle;">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <span style="vertical-align: middle;">Back to Dashboard</span>
                </a>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        const userJson = localStorage.getItem('user');
        if (!token || !userJson) {
            alert("Unauthorized. Redirecting to login.");
            window.location.href = "login.html";
        }

        const user = JSON.parse(userJson);
        
        // Show user details in navbar
        document.querySelector('.header-actions').innerHTML = `
            <div class="user-profile-menu">
                <span class="user-welcome">Welcome, <strong>${user.name}</strong></span>
                <button class="btn-logout" onclick="localStorage.clear(); window.location.href='index.html';">Sign Out</button>
            </div>
        `;

        const form = document.getElementById('profileForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = form.querySelector('.btn-auth-submit');
            submitBtn.innerText = "Saving...";
            submitBtn.disabled = true;

            const formData = new FormData();
            formData.append('fname', document.getElementById('fname').value.trim());
            formData.append('lname', document.getElementById('lname').value.trim());
            formData.append('addressline', document.getElementById('addressline').value.trim());
            formData.append('zipcode', document.getElementById('zipcode').value.trim());
            formData.append('phone', document.getElementById('phone').value.trim());
            formData.append('userId', user.id);

            const fileInput = document.getElementById('avatar');
            if (fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            try {
                const response = await fetch('http://localhost:3000/api/v1/update-profile', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert("Profile updated successfully!");
                    window.location.href = "dashboard.html";
                } else {
                    alert(data.error || "Failed to update profile.");
                }
            } catch (err) {
                console.error(err);
                alert("Connection error. Ensure the server is online.");
            } finally {
                submitBtn.innerText = "Save Profile";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
