<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Little Mono</title>
    <meta name="description" content="Create your Little Mono account to begin your designer toy collection journey.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page-container">
        <div class="auth-card register-card">
            <div class="auth-card-header" onclick="window.location.href='index.html'">
                <div class="logo">
                    <span class="brand-name">LITTLE MONO</span>
                    <span class="sub-brand">DESIGNER TOYS</span>
                </div>
            </div>
            
            <form class="auth-form active" id="registerForm">
                <h2 class="auth-title">Join Little Mono</h2>
                <p class="auth-subtitle">Begin your unboxing collection journey</p>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="registerFName">First Name</label>
                        <input type="text" id="registerFName" placeholder="First Name" required autocomplete="given-name">
                    </div>
                    <div class="input-group">
                        <label for="registerLName">Last Name</label>
                        <input type="text" id="registerLName" placeholder="Last Name" required autocomplete="family-name">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="registerEmail">Email Address</label>
                    <input type="email" id="registerEmail" placeholder="Enter your email" required autocomplete="email">
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="registerPhone">Phone Number</label>
                        <input type="tel" id="registerPhone" placeholder="Phone Number" required autocomplete="tel">
                    </div>
                    <div class="input-group">
                        <label for="registerDOB">Date of Birth</label>
                        <input type="date" id="registerDOB" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="input-group">
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" placeholder="Create password" required autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <label for="registerConfirmPassword">Confirm Password</label>
                        <input type="password" id="registerConfirmPassword" placeholder="Confirm password" required autocomplete="new-password">
                    </div>
                </div>

                <!-- Optional Address Section -->
                <div style="margin-top: 1.5rem; border-top: 1px solid rgba(197, 168, 128, 0.15); padding-top: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem;">
                        <span style="font-family: var(--font-heading); font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Addresses (Optional)</span>
                        <button type="button" id="addAddressBtn" style="background: none; border: 1px solid var(--accent-gold); color: var(--accent-gold-dark); border-radius: 4px; padding: 0.25rem 0.75rem; font-size: 0.75rem; font-family: var(--font-heading); font-weight: 600; cursor: pointer; transition: all 0.3s ease;">+ Add Address</button>
                    </div>
                    <div id="addressListContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Dynamically populated address templates -->
                    </div>
                </div>
                
                <button type="submit" class="btn-auth-submit" style="margin-top: 1.5rem;">Create Account</button>
                <p class="auth-switch-text">Already a collector? <a href="login.html" class="switch-link">Sign in</a></p>
            </form>

            <div class="auth-back-link">
                <a href="index.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" style="transform: rotate(180deg); display: inline-block; vertical-align: middle;">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <span style="vertical-align: middle;">Back to Home</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
