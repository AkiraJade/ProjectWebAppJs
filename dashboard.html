<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Little Mono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="window.location.href='index.html'">
            <span class="brand-name">LITTLE MONO</span>
            <span class="sub-brand">DESIGNER TOYS</span>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="cart.html" class="nav-link">Cart</a>
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </nav>
        <div class="header-actions">
            <a href="login.html" class="btn-login" id="loginRegisterBtn">Login / Register</a>
        </div>
    </header>

    <div class="auth-page-container" style="padding-top: 120px;">
        <div class="auth-card" style="max-width: 800px; width: 95%;">
            <h2 class="auth-title">Collector Dashboard</h2>
            <p class="auth-subtitle">Overview of your activity and unboxed collections</p>
            
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin: 2rem 0;">
                <div style="background-color: rgba(245, 239, 230, 0.4); border: 1px solid rgba(197, 168, 128, 0.2); padding: 1.5rem; border-radius: 12px; text-align: center;">
                    <span style="font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Total Orders</span>
                    <h3 style="font-family: var(--font-heading); font-size: 2rem; color: var(--text-primary); margin-top: 0.5rem;">0</h3>
                </div>
                <div style="background-color: rgba(245, 239, 230, 0.4); border: 1px solid rgba(197, 168, 128, 0.2); padding: 1.5rem; border-radius: 12px; text-align: center;">
                    <span style="font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Loyalty Points</span>
                    <h3 style="font-family: var(--font-heading); font-size: 2rem; color: var(--accent-gold-dark); margin-top: 0.5rem;">150</h3>
                </div>
                <div style="background-color: rgba(245, 239, 230, 0.4); border: 1px solid rgba(197, 168, 128, 0.2); padding: 1.5rem; border-radius: 12px; text-align: center;">
                    <span style="font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Collection Rank</span>
                    <h3 style="font-family: var(--font-heading); font-size: 1.5rem; color: var(--text-primary); margin-top: 0.8rem;">Novice</h3>
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <button class="btn-auth-submit" style="flex: 1;" onclick="window.location.href='profile.html'">Edit Profile</button>
                <button class="btn-auth-submit" style="flex: 1; background-color: transparent; border: 1px solid rgba(28,28,28,0.15); color: var(--text-primary);" onclick="window.location.href='deactivate.html'">Deactivate Account</button>
            </div>
            
            <div class="auth-back-link">
                <a href="index.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" style="transform: rotate(180deg); display: inline-block; vertical-align: middle;">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <span style="vertical-align: middle;">Back to Home</span>
                </a>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('token');
        const userJson = localStorage.getItem('user');
        if (token && userJson) {
            const user = JSON.parse(userJson);
            document.querySelector('.header-actions').innerHTML = `
                <div class="user-profile-menu">
                    <span class="user-welcome">Welcome, <strong>${user.name}</strong></span>
                    <button class="btn-logout" onclick="localStorage.clear(); window.location.href='index.html';">Sign Out</button>
                </div>
            `;
        } else {
            // Guard dashboard page from unauthorized users
            alert("Please sign in to view dashboard.");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
