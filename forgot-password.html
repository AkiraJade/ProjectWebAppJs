<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Little Mono</title>
    <meta name="description" content="Recover your password for your Little Mono designer toys account.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page-container">
        <div class="auth-card">
            <div class="auth-card-header" onclick="window.location.href='index.html'">
                <div class="logo">
                    <span class="brand-name">LITTLE MONO</span>
                    <span class="sub-brand">DESIGNER TOYS</span>
                </div>
            </div>
            
            <form class="auth-form active" id="forgotForm">
                <h2 class="auth-title">Recover Password</h2>
                <p class="auth-subtitle">We will send a secure password reset link to your email</p>
                
                <div class="input-group">
                    <label for="recoveryEmail">Email Address</label>
                    <input type="email" id="recoveryEmail" placeholder="Enter your email" required autocomplete="email">
                </div>
                
                <button type="submit" class="btn-auth-submit" id="submitBtn">Send Recovery Link</button>
                <p class="auth-switch-text">Remember password? <a href="login.html" class="switch-link">Sign In</a></p>
            </form>

            <div class="auth-back-link">
                <a href="login.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" style="transform: rotate(180deg); display: inline-block; vertical-align: middle;">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <span style="vertical-align: middle;">Back to Sign In</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/v1';
        const form = document.getElementById('forgotForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('recoveryEmail').value.trim();

            submitBtn.innerText = "Sending Link...";
            submitBtn.disabled = true;

            try {
                const data = await $.ajax({
                    url: `${API_URL}/forgot-password`,
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ email }),
                    dataType: 'json'
                });

                alert(data.message || "A password reset link has been sent to your email!");
                form.reset();
            } catch (xhr) {
                const errData = xhr.responseJSON || {};
                alert(errData.error || "Failed to process request. Please try again.");
            } finally {
                submitBtn.innerText = "Send Recovery Link";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
