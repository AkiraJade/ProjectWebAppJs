<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — Little Mono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="logo" onclick="window.location.href='index.html'">
            <span class="brand-name">LITTLE MONO</span>
            <span class="sub-brand">DESIGNER TOYS</span>
        </div>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="cart.html" class="nav-link active">Cart</a>
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </nav>
        <div class="header-actions">
            <a href="login.html" class="btn-login" id="loginRegisterBtn">Login / Register</a>
        </div>
    </header>

    <div class="auth-page-container" style="padding-top: 120px;">
        <div class="auth-card" style="max-width: 600px; width: 95%;">
            <h2 class="auth-title">Your Cart</h2>
            <p class="auth-subtitle">Review your Hirono designer toy selections</p>
            
            <div style="display: flex; flex-direction: column; gap: 1.5rem; margin: 2rem 0; border-top: 1px solid rgba(197, 168, 128, 0.15); border-bottom: 1px solid rgba(197, 168, 128, 0.15); padding: 1.5rem 0;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h4 style="font-family: var(--font-heading); font-size: 1.1rem; color: var(--text-primary);">Hirono Hero Prince</h4>
                        <span style="font-size: 0.85rem; color: var(--text-secondary);">Quantity: 1</span>
                    </div>
                    <span style="font-family: var(--font-heading); font-weight: 600; color: var(--accent-gold-dark);">$599.00</span>
                </div>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700;">
                <span style="color: var(--text-primary);">Total</span>
                <span style="color: var(--accent-gold-dark);">$599.00</span>
            </div>
            
            <button class="btn-auth-submit" onclick="alert('Checkout integration coming soon!')">Proceed to Checkout</button>
            
            <div class="auth-back-link">
                <a href="index.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" style="transform: rotate(180deg); display: inline-block; vertical-align: middle;">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <span style="vertical-align: middle;">Back to Home</span>
                </a>
            </div>
        </div>
    </div>
    <script>
        // Check session at start to keep navbar dynamic
        const token = localStorage.getItem('token');
        const userJson = localStorage.getItem('user');
        if (token && userJson) {
            const user = JSON.parse(userJson);
            document.querySelector('.header-actions').innerHTML = `
                <div class="user-profile-menu">
                    <span class="user-welcome">Welcome, <strong>${user.name}</strong></span>
                    <button class="btn-logout" onclick="localStorage.clear(); window.location.reload();">Sign Out</button>
                </div>
            `;
        }
    </script>
</body>
</html>
