<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Little Mono</title>
    <meta name="description" content="Sign in to your Little Mono account and manage your Hirono collectibles collection.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-page-container">
        <div class="auth-card">
            <div class="auth-card-header" onclick="window.location.href='index.html'">
                <div class="logo">
                    <span class="brand-name">LITTLE MONO</span>
                    <span class="sub-brand">DESIGNER TOYS</span>
                </div>
            </div>
            
            <form class="auth-form active" id="loginForm">
                <h2 class="auth-title">Welcome Back</h2>
                <p class="auth-subtitle">Immerse yourself in Hirono once more</p>
                
                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-auth-submit">Sign In</button>
                <p class="auth-switch-text">New collector? <a href="register.html" class="switch-link">Create an account</a></p>
            </form>

            <div class="auth-back-link">
                <a href="index.html">
                    <svg viewBox="0 0 24 24" width="16" height="16" style="transform: rotate(180deg); display: inline-block; vertical-align: middle;">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <span style="vertical-align: middle;">Back to Home</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
